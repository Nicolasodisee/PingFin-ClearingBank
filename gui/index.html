<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingFin Clearing Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0f172a] text-slate-200 font-sans overflow-hidden">

    <div class="flex h-screen">
        <nav class="w-64 bg-[#1e293b] p-6 border-r border-slate-700 flex flex-col justify-between">
            <div>
                <h1 class="text-2xl font-black text-white mb-10 tracking-tighter italic">CLEAR.BANK</h1>

                <div class="space-y-2 js-nav-group">
                    <p class="text-xs font-semibold text-slate-500 uppercase mb-2 ml-2">Main Menu</p>

                    <button type="button"
                        class="w-full text-left p-3 bg-blue-600 rounded-lg text-white flex items-center space-x-3 js-nav-btn active"
                        data-page="dashboardPage" data-title="Dashboard">
                        <span></span> <span>Live Traffic</span>
                    </button>

                    <button type="button"
                        class="w-full text-left p-3 hover:bg-slate-700 rounded-lg flex items-center space-x-3 js-nav-btn"
                        data-page="bankNodesPage" data-title="Bank Nodes">
                        <span></span> <span>Bank Nodes</span>
                    </button>

                    <button type="button"
                        class="w-full text-left p-3 hover:bg-slate-700 rounded-lg flex items-center space-x-3 js-nav-btn"
                        data-page="trafficLogsPage" data-title="Traffic Logs">
                        <span></span> <span>Log Files</span>
                    </button>
                </div>
            </div>

            <div class="border-t border-slate-700 pt-4">
                <button type="button"
                    class="w-full text-left p-2 text-slate-400 hover:text-white text-sm flex items-center space-x-2">
                    <span></span> <span>Settings</span>
                </button>
            </div>
        </nav>

        <main class="flex-1 p-10 overflow-y-auto">

            <header class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-bold text-white js-page-title">Dashboard</h2>
                <div class="flex items-center space-x-4">
                    <span class="px-3 py-1 bg-slate-800 rounded-full text-xs text-green-400 border border-green-900/50">
                        ● Online
                    </span>
                    <span class="text-sm text-slate-400">Admin Mode</span>
                </div>
            </header>

            <section id="dashboardPage" class="js-page">
                <div class="grid grid-cols-2 gap-6 mb-10">
                    <div class="bg-[#1e293b] p-6 rounded-xl border border-slate-700 shadow-lg">
                        <p class="text-slate-500 text-xs uppercase font-bold mb-1">Pending POs</p>
                        <h3 class="text-5xl font-bold text-white js-total-count">0</h3>
                    </div>
                    <div class="bg-[#1e293b] p-6 rounded-xl border border-slate-700 shadow-lg">
                        <p class="text-slate-500 text-xs uppercase font-bold mb-1">Connected Banks</p>
                        <h3 class="text-5xl font-bold text-white js-bank-count">0</h3>
                    </div>
                </div>

                <div class="bg-[#1e293b] rounded-xl border border-slate-700 shadow-2xl overflow-hidden">
                    <div class="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between">
                        <h4 class="font-bold text-slate-300">Recent Incoming PO_OUT</h4>
                        <span class="text-xs text-slate-500">Real-time update</span>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-800/30 text-slate-500 text-xs uppercase">
                            <tr>
                                <th class="p-4 font-medium">ID</th>
                                <th class="p-4 font-medium">From Bank</th>
                                <th class="p-4 font-medium">To Bank</th>
                                <th class="p-4 font-medium">Amount</th>
                                <th class="p-4 font-medium text-right">Status</th>
                            </tr>
                        </thead>
                        <tbody class="js-table-body text-sm">
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="bankNodesPage" class="js-page hidden">
                <div class="grid grid-cols-3 gap-6 js-bank-list">
                </div>
            </section>

            <section id="trafficLogsPage" class="js-page hidden">
                <div class="bg-[#1e293b] rounded-xl border border-slate-700 p-6 shadow-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="font-bold text-xl text-white">Transaction Audit Trail</h4>
                        <button class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm">
                            Export Logs (.csv)
                        </button>
                    </div>
                    <pre
                        class="bg-black/40 p-6 rounded-lg text-green-400 font-mono text-xs leading-relaxed border border-slate-800 h-[500px] overflow-y-scroll js-logs-content">
[SYSTEM]: Logger initialized...
[INFO]: Waiting for traffic...
                    </pre>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
